<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1440" />
  <title>Oliver – Portfolio</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #0d0d0d;
      --color-text: #ffffff;
      --font-sans: 'Satoshi', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --hero-letter-spacing: 4px;
    }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      min-width: 1440px;
      font-family: var(--font-sans);
      overflow-x: hidden;
    }

    /* ── 00 Centered enter button (white square) ── */
    .enter-button {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }

    .enter-button__square {
      width: 56px;
      height: 56px;
      background: #ffffff;
      cursor: pointer;
      pointer-events: auto;
      will-change: transform;
      transition: transform 180ms ease-out, box-shadow 180ms ease-out, background 180ms ease-out;
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
    }

    .enter-button__square:hover {
      transform: scale(1.4);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
      background: #f5f5f5;
    }

    .enter-button__square:active {
      transform: scale(1.25);
      transition-duration: 0ms;
    }

    .enter-button__square--zoom {
      transform: scale(50);
      transition: transform 400ms cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }

    /* ── 01 Hero ── */
    .hero {
      width: 100vw;
      height: 100vh;
      background: #0d0d0d;
      position: relative;
    }

    .hero__text {
      position: absolute;
      left: 15px;
      top: 940px;
      width: 594px;
      font-family: var(--font-sans);
      font-weight: 500;
      font-size: 45px;
      color: var(--color-text);
      letter-spacing: var(--hero-letter-spacing);
      line-height: normal;
      white-space: pre-wrap;
    }

    .hero__dot {
      display: inline-block;
      width: 0.35em;
      text-align: left;
      animation: blink 1s steps(2, start) infinite;
    }

    @keyframes blink {
      0%, 50% {
        opacity: 1;
      }
      50.01%, 100% {
        opacity: 0;
      }
    }

    /* ── 02 Quadrant Grid ── */
    .quadrant-grid {
      width: 1440px;
      height: 900px;
      background: #0d0d0d;
      position: relative;
      display: grid;
      grid-template-columns: 718px 718px;
      grid-template-rows: 448px 448px;
      gap: 0 4px;
      row-gap: 4px;
    }

    .quadrant {
      position: relative;
      overflow: hidden;
    }

    .quadrant--tl { background: #1a1a1a; }
    .quadrant--tr { background: #242424; }
    .quadrant--bl { background: #242424; }
    .quadrant--br { background: #1a1a1a; }

    .quadrant__label {
      position: absolute;
      left: 40px;
      top: 40px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: #666;
      letter-spacing: 3px;
      white-space: nowrap;
    }

    /* ── 03 Horizontal Scroll Gallery ── */
    .gallery {
      width: 1440px;
      height: 900px;
      background: #111;
      overflow-x: scroll;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .gallery::-webkit-scrollbar { display: none; }

    .gallery__track {
      width: 4200px;
      height: 900px;
      position: relative;
    }

    .card {
      position: absolute;
      width: 580px;
      height: 760px;
      top: 70px;
      border-radius: 3px;
      overflow: hidden;
    }

    .card:nth-child(1) { left: 80px;   background: #1a1a1a; }
    .card:nth-child(2) { left: 680px;  background: #212121; }
    .card:nth-child(3) { left: 1280px; background: #292929; }
    .card:nth-child(4) { left: 1880px; background: #1f1f1f; }
    .card:nth-child(5) { left: 2480px; background: #171717; }
    .card:nth-child(6) { left: 3080px; background: #262626; }

    .card__number {
      position: absolute;
      left: 36px;
      bottom: 40px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 48px;
      color: #404040;
      white-space: nowrap;
    }

    /* ── 04 Footer ── */
    .footer {
      width: 1440px;
      height: 180px;
      background: #0a0a0a;
      position: relative;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 13px;
    }

    .footer__copy {
      position: absolute;
      left: 80px;
      top: 82px;
      color: #666;
      white-space: nowrap;
    }

    .footer__nav {
      position: absolute;
      top: 82px;
      right: 80px;
      display: flex;
      gap: 44px;
      color: #f5f5f5;
      white-space: nowrap;
    }

    .footer__nav a {
      color: #f5f5f5;
      text-decoration: none;
    }

    .footer__nav a:hover {
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <!-- 00 Centered enter button -->
  <div class="enter-button">
    <div class="enter-button__square" id="enter-square"></div>
  </div>

  <!-- 01 Hero -->
  <section class="hero">
    <div class="hero__text" id="hero-text"></div>
  </section>

  <script>
    const introText = 'Hey im Oliver,\nWelcome to my site';
    const promptText = 'Click to enter';

    const target = document.getElementById('hero-text');
    const enterSquare = document.getElementById('enter-square');

    const delay = 55; // ms per character – typing speed

    function typeText(text, onComplete) {
      if (!target) return;
      let index = 0;

      function step() {
        if (index <= text.length) {
          target.textContent = text.slice(0, index);
          index += 1;
          requestAnimationFrame(() => setTimeout(step, delay));
        } else if (typeof onComplete === 'function') {
          onComplete();
        }
      }

      step();
    }

    function runSequence() {
      // 1. Type the intro text
      typeText(introText, () => {
        // 2. Brief pause, clear, then type "Click to enter"
        setTimeout(() => {
          if (target) target.textContent = '';
          typeText(promptText, () => {
            // Append blinking period after "Click to enter"
            if (!target) return;
            const dot = document.createElement('span');
            dot.className = 'hero__dot';
            dot.textContent = '.';
            target.appendChild(dot);
          });
        }, 550);
      });
    }

    if (enterSquare) {
      function startZoom() {
        if (enterSquare.classList.contains('enter-button__square--zoom')) return;
        enterSquare.classList.add('enter-button__square--zoom');
        enterSquare.addEventListener('transitionend', () => {
          document.body.style.background = '#ffffff';
          document.body.style.color = '#000000';
        }, { once: true });
      }
      enterSquare.addEventListener('mousedown', startZoom);
      enterSquare.addEventListener('touchstart', startZoom, { passive: true });
    }

    window.addEventListener('load', runSequence);
  </script>

</body>
</html>
